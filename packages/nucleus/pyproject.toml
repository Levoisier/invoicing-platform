[project]
name = "nucleus"
version = "0.1.0"
description = "Reusable transactional core: primitives, DB/UoW, contracts, registry, module loader, event bus, API/auth."
requires-python = ">=3.11"
# The core's runtime deps. It owns transactions (SQLAlchemy), validation/precision
# (Pydantic), the Postgres driver, JWT, and the API gateway itself (FastAPI) —
# README §1 puts the gateway *in* the nucleus. "Framework-light" here means it
# never depends on a module or a plugin; that inversion is the whole project
# (CLAUDE.md §2). FastAPI is the gateway framework the core provides, not a domain
# dependency.
dependencies = [
    "sqlalchemy>=2.0",
    "pydantic>=2",
    "psycopg[binary]>=3.1",
    "pyjwt>=2.8",
    "fastapi>=0.115",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Dir is `packages/nucleus` (prefixed for legibility) but the import name is the
# clean `nucleus`; point hatchling at the src-layout package explicitly.
[tool.hatch.build.targets.wheel]
packages = ["src/nucleus"]
