[project]
name = "invoicing"
version = "0.1.0"
description = "Invoicing domain module: Party, Invoice, InvoiceLine, gapless numbering, PDF."
requires-python = ">=3.11"
# Depends on the nucleus only. It computes IVA via the registry, so it must NOT
# depend on plugin-tax-co (CLAUDE.md §2). PDF deps (WeasyPrint) are added in B11.
dependencies = ["nucleus"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/invoicing"]
