[project]
name = "payments"
version = "0.1.0"
description = "Payments domain module: Payment, LedgerEntry, atomic invoice-status transitions."
requires-python = ">=3.11"
# Depends on nucleus (and at runtime cooperates with invoicing through the shared
# transaction and event bus, not a hard import).
dependencies = ["nucleus"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/payments"]
