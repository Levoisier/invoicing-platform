# Local self-host stack: db + api + web (README §8). `docker compose up` builds
# and starts all three. The api migrates on startup once the db is healthy, so the
# §7.A flow is reachable as soon as the containers are up — no manual migrate step.

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-invoicing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-invoicing}
      POSTGRES_DB: ${POSTGRES_DB:-invoicing}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Gate dependents on real readiness, not just "container started" — otherwise
    # the API races the DB on boot.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invoicing}"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    # DATABASE_URL (host "db"), JWT/auth/CORS all come from .env — copy
    # .env.example → .env before `up`.
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      args:
        # Baked into the browser bundle at build time, so it must be the
        # host-reachable API URL, not the compose-internal "api" hostname.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
